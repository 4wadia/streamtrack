<div class="onboarding-page">
    <div class="onboarding-content glass preview-container">
        <div class="onboarding-header">
            <h1 class="text-display">We found some gems for you</h1>
            <p class="text-secondary">Based on your services and vibe. Here's a peek.</p>
        </div>

        @if (loading()) {
        <div class="loading-grid">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>
        } @else {
        <div class="preview-grid">
            @for (item of recommendations(); track item.id) {
            <div class="preview-card">
                <img [src]="getImageUrl(item.posterPath)" [alt]="item.title" class="poster">
                <div class="card-overlay">
                    <span class="rating">★ {{ item.rating }}</span>
                </div>
            </div>
            }
        </div>
        }

        <div class="onboarding-footer">
            <button class="btn-primary btn-large" (click)="startWatching()">
                Start Watching →
            </button>
        </div>
    </div>
</div>
